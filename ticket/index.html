<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketverkauf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Ticketverkauf</h1>
    <div class="ticket-section">
      <p>Wählen Sie ein Ticket:</p>
      <button id="singleBtn" class="ticket-btn">Einzelfahrt</button>
      <button id="singlekindBtn" class="ticket-btn">Einzelfahrt (Kind)</button>
      <button id="dayBtn" class="ticket-btn">Tageskarte</button>
      <button id="weekBtn" class="ticket-btn">Wochenkarte</button>
      <button id="monthBtn" class="ticket-btn">Monatskarte</button>
      <button id="infoBtn" class="info-btn">ℹ Kategorien</button>
    </div>
    <div id="message"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
