<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketkategorien</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Ticketkategorien</h1>
    <div class="categories">
      <div class="category-card">
        <h2>Einzelfahrt</h2>
        <p class="price">€1.25</p>
        <p class="description">Eine Fahrt innerhalb der Stadt</p>
      </div>
      <div class="category-card">
        <h2>Einzelfahrt (Kind)</h2>
        <p class="price">€0.75</p>
        <p class="description">Eine Fahrt für Kinder unter 10 Jahren</p>
      </div>
      <div class="category-card">
        <h2>Tageskarte</h2>
        <p class="price">€5.55</p>
        <p class="description">Unbegrenzte Fahrten für einen Tag</p>
      </div>
      <div class="category-card">
        <h2>Wochenkarte</h2>
        <p class="price">€22.25</p>
        <p class="description">Unbegrenzte Fahrten für 7 Tage</p>
      </div>
      <div class="category-card">
        <h2>Monatskarte</h2>
        <p class="price">€55.55</p>
        <p class="description">Unbegrenzte Fahrten für 28 Tage</p>
      </div>
    </div>
    <button id="backBtn" class="back-btn">Zurück zum Ticketverkauf</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
